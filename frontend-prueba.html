<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ShopSmart - Panel FullStack</title>
    <style>
        /* Configuración General */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        h1 { text-align: center; color: #1a2a6c; margin-bottom: 30px; }
        
        .contenedor { 
            display: flex; 
            gap: 25px; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: flex-start;
        }

        /* Tarjetas de Microservicios */
        .tarjeta { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            width: 360px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid #ccc;
        }
        .inv-border { border-top-color: #2ecc71; } /* Verde */
        .ped-border { border-top-color: #3498db; } /* Azul */
        .usr-border { border-top-color: #9b59b6; } /* Morado */

        h2 { font-size: 1.1rem; margin-top: 0; display: flex; justify-content: space-between; }
        .puerto { font-size: 0.8rem; color: #777; background: #eee; padding: 2px 8px; border-radius: 10px; }

        /* Inputs y Botones */
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-top: 8px; }
        input { 
            width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; 
            border-radius: 5px; box-sizing: border-box; font-size: 13px;
        }
        button { 
            width: 100%; padding: 10px; margin-top: 12px; cursor: pointer; 
            border: none; border-radius: 5px; font-weight: bold; transition: 0.3s;
        }
        .btn-get { background: #f8f9fa; border: 1px solid #ddd; color: #333; margin-bottom: 5px; }
        .btn-get:hover { background: #e9ecef; }
        .btn-post { background: #2c3e50; color: white; }
        .btn-post:hover { background: #1a252f; }

        /* Visor de JSON Optimizado para listas grandes */
        .respuesta { 
            background: #1e1e1e; 
            color: #a8ff78; 
            padding: 12px; 
            margin-top: 15px; 
            font-family: 'Consolas', monospace; 
            font-size: 12px; 
            border-radius: 6px;
            
            /* Scroll mágico */
            height: 250px; 
            overflow-y: auto; 
            overflow-x: auto;
            white-space: pre; /* Mantiene la estructura del JSON */
            border: 1px solid #333;
        }
        .error { color: #ff6b6b; border-color: #ff6b6b; }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<h1>ShopSmart - Control de Microservicios</h1>

<div class="contenedor">

    <div class="tarjeta inv-border">
        <h2>Inventario <span class="puerto">:8081</span></h2>
        <button class="btn-get" onclick="getInventario()">Listar Productos (GET)</button>
        <div class="respuesta" id="res-get-inv">[]</div>
        <hr>
        <label>Nombre Producto</label>
        <input type="text" id="p-nombre" value="Silla Gamer">
        <label>Precio</label>
        <input type="number" id="p-precio" value="150000">
        <label>Stock</label>
        <input type="number" id="p-stock" value="20">
        <label>ID Almacén</label>
        <input type="number" id="p-almacen" value="1">
        <button class="btn-post" onclick="postInventario()">Guardar Producto (POST)</button>
    </div>

    <div class="tarjeta ped-border">
        <h2>Pedidos <span class="puerto">:8084</span></h2>
        <button class="btn-get" onclick="getPedidos()">Listar Pedidos (GET)</button>
        <div class="respuesta" id="res-get-ped">[]</div>
        <hr>
        <label>ID Cliente</label>
        <input type="number" id="ped-cliente" value="6">
        <label>ID Producto</label>
        <input type="number" id="ped-producto" value="2">
        <label>Cantidad</label>
        <input type="number" id="ped-cantidad" value="1">
        <label>Total Pago</label>
        <input type="number" id="ped-total" value="350000">
        <button class="btn-post" onclick="postPedido()">Crear Pedido (POST)</button>
    </div>

    <div class="tarjeta usr-border">
        <h2>Usuarios <span class="puerto">:8085</span></h2>
        <button class="btn-get" onclick="getUsuarios()">Listar Usuarios (GET)</button>
        <div class="respuesta" id="res-get-usr">[]</div>
        <hr>
        <label>Nombre Completo</label>
        <input type="text" id="u-nombre" value="Sofia Torres">
        <label>Email</label>
        <input type="email" id="u-email" value="sofia@gmail.com">
        <label>Teléfono</label>
        <input type="text" id="u-telefono" value="+56933445566">
        <button class="btn-post" onclick="postUsuario()">Registrar Usuario (POST)</button>
    </div>

</div>

<script>
    // URLs de los Microservicios
    const API_INV = "http://localhost:8081/api/productos";
    const API_PED = "http://localhost:8084/api/pedidos";
    const API_USR = "http://localhost:8085/api/usuarios";

    // Función Maestra para Fetch
    async function ejecutar(url, metodo, cuerpo, idRespuesta) {
        const visor = document.getElementById(idRespuesta);
        visor.textContent = "Procesando...";
        visor.classList.remove("error");

        const options = {
            method: metodo,
            headers: { "Content-Type": "application/json" }
        };
        if (cuerpo) options.body = JSON.stringify(cuerpo);

        try {
            const res = await fetch(url, options);
            const data = await res.json();
            
            if (!res.ok) {
                visor.classList.add("error");
                visor.textContent = `Error ${res.status}:\n${JSON.stringify(data, null, 2)}`;
            } else {
                visor.textContent = JSON.stringify(data, null, 2);
            }
        } catch (err) {
            visor.classList.add("error");
            visor.textContent = "Error: No se pudo conectar.\n¿Está activo el microservicio?";
        }
    }

    // Funciones Inventario
    function getInventario() { ejecutar(API_INV, 'GET', null, 'res-get-inv'); }
    function postInventario() {
        const data = {
            nombre: document.getElementById('p-nombre').value,
            precio: Number(document.getElementById('p-precio').value),
            stock: Number(document.getElementById('p-stock').value),
            idAlmacen: Number(document.getElementById('p-almacen').value)
        };
        ejecutar(API_INV, 'POST', data, 'res-get-inv');
    }

    // Funciones Pedidos
    function getPedidos() { ejecutar(API_PED, 'GET', null, 'res-get-ped'); }
    function postPedido() {
        const data = {
            idCliente: Number(document.getElementById('ped-cliente').value),
            idProducto: Number(document.getElementById('ped-producto').value),
            cantidad: Number(document.getElementById('ped-cantidad').value),
            total: Number(document.getElementById('ped-total').value)
        };
        ejecutar(API_PED, 'POST', data, 'res-get-ped');
    }

    // Funciones Usuarios
    function getUsuarios() { ejecutar(API_USR, 'GET', null, 'res-get-usr'); }
    function postUsuario() {
        const data = {
            nombre: document.getElementById('u-nombre').value,
            email: document.getElementById('u-email').value,
            telefono: document.getElementById('u-telefono').value
        };
        ejecutar(API_USR, 'POST', data, 'res-get-usr');
    }
</script>

</body>
</html>
